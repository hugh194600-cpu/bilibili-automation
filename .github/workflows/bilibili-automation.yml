# GitHub Actions 工作流 - B站自动化任务定时执行
# 
# 使用说明：
# 1. 将此文件放到仓库的 .github/workflows/ 目录下
# 2. 在GitHub仓库设置中添加密钥：BILIBILI_COOKIE
# 3. 启用Actions，即可定时自动运行
# 
# 免费额度：每月2000分钟（公共仓库），足够学习使用

name: Bilibili Automation

on:
  # 定时触发 - 每天早上9点执行
  schedule:
    - cron: '0 1 * * *'  # UTC时间，对应北京时间 9:00
  
  # 手动触发
  workflow_dispatch:
    inputs:
      debug:
        description: '调试模式'
        required: false
        default: 'false'

jobs:
  bilibili-tasks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv
      
      - name: 执行自动化任务
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
        run: |
          python bilibili_automation.py
      
      - name: 上传日志作为artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-log-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7

  # 备选方案：用 GitHub Pages 展示运行状态（可选）
  deploy-status:
    needs: bilibili-tasks
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 生成状态报告
        run: |
          echo "## B站自动化任务状态" > status.md
          echo "- 运行时间: $(date)" >> status.md
          echo "- 任务状态: ${{ needs.bilibili-tasks.result }}" >> status.md
          echo "---" >> status.md
          echo "更多详情请查看 Actions 运行日志" >> status.md
          cat status.md
